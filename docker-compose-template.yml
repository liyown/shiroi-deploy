x-default-logging: &logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"
    tag: "{{.Name}}"
services:
  front:
    container_name: mx-server-fronted
    image: ghcr.io/liyown/shiroi:latest
    environment:
      - PORT=__FRONT_PORT__
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=__NEXT_PUBLIC_API_URL__
      - NEXT_PUBLIC_GATEWAY_URL=__NEXT_PUBLIC_GATEWAY_URL__
      - ENABLE_EXPERIMENTAL_COREPACK=1
      - TMDB_API_KEY=__TMDB_API_KEY__
      - GH_TOKEN=__GH_TOKEN__
    ports:
      - '__FRONT_PORT__:2323'
    restart: unless-stopped
  app:
    container_name: mx-server
    image: innei/mx-server:latest
    environment:
      - TZ=__TZ__
      - NODE_ENV=production
      - DB_HOST=mongo
      - REDIS_HOST=redis
      - ALLOWED_ORIGINS=__ALLOWED_ORIGINS__
      - JWT_SECRET=__JWT_SECRET__
    volumes:
      - ./data/mx-space:/root/.mx-space
    ports:
      - '__APP_PORT__:2333'
    depends_on:
      - mongo
      - redis
    networks:
      - mx-space
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:2333/api/v2/ping']
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  mongo:
    container_name: mongo
    image: mongo:7.0
    volumes:
      - ./data/db:/data/db
    networks:
      - mx-space
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    networks:
      - mx-space
    restart: unless-stopped

networks:
  mx-space:
    driver: bridge
